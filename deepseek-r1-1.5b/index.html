<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
        }

        #gameCanvas {
            border: 2px solid white;
        }

        #score-container {
            position: absolute;
            top: -40px;
            left: 80%;
            width: 70%;
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: #333;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        button {
            margin: 10px;
            padding: 8px 16px;
            font-family: Arial, sans-serif;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="score-container">
        Score: <span id="score">0</span><br>
        High score: <span id="highScore">0</span>
    </div>
    <button id="startButton" onclick="startGame()">Start Game</button>
    <button id="restartButton" onclick="resetGame()">Reset Game</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');

        let snake = [];
        let head = {};
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let highScore = 0;

        function initGame() {
            // Reset game state
            clearInterval(startButton.textContent);
            startButton.textContent = 'Start Game!';
            
            snake = [
                { x: 2, y: 4 },
                { x: 1, y: 4 }
            ];
            
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreElement.textContent = score;
            gameOver = false;
            highScore = 0;

            // Generate food
            generateFood();
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / 4)),
                y: Math.floor(Math.random() * (canvas.height / 4))
            };
            
            // Make sure food doesn't appear on snake
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === food.x && snake[i].y === food.y) {
                    generateFood();
                }
            }
        }

        function update() {
            if (!gameStarted) return;

            // Move snake
            head = { x: snake[0].x, y: snake[0].y };

            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // Check collision with walls
            if (head.x < 0 || head.x >= canvas.width - 1 || 
                head.y < 0 || head.y >= canvas.height - 1) {
                gameOver = true;
                highScore += 10;
                document.getElementById('highScore').textContent = highScore;
                startButton.textContent = 'Game Over!';
                return;
            }

            // Check collision with self
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver = true;
                highScore += 50;
                document.getElementById('highScore').textContent = highScore;
                startButton.textContent = 'Start Game!';
                return;
            }

            snake.unshift(head);

            // Check if food is eaten
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            const snakeSegment = { x: snake[0].x, y: snake[0].y };
            switch (direction) {
                case 'right':
                    ctx.beginPath();
                    ctx.arc(snakeSegment.x + 1.5, snakeSegment.y, 2, 0, Math.PI * 2);
                    break;
                case 'left':
                    ctx.beginPath();
                    ctx.arc(snakeSegment.x - 1.5, snakeSegment.y, 2, Math.PI, 0);
                    break;
                case 'up':
                    ctx.beginPath();
                    ctx.arc(snakeSegment.x, snakeSegment.y + 1.5, 2, 0, Math.PI);
                    break;
                case 'down':
                    ctx.beginPath();
                    ctx.arc(snakeSegment.x, snakeSegment.y - 1.5, 2, Math.PI * 2, 0);
                    break;
            }

            // Draw food
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(head.x + 1.5, head.y, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function handleKeyPress(e) {
            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') direction = 'up';
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') direction = 'down';
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') direction = 'left';
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') direction = 'right';
                    break;
            }
        }

        function startGame() {
            if (!gameStarted) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw score
            scoreElement.textContent = `Score: ${score}`;
            generateFood();
            draw();

            // Start game loop
            const gameInterval = setInterval(() => {
                update();
                draw();
            }, 100); // 60 FPS

            return () => clearInterval(gameInterval);
        }

        function resetGame() {
            clearInterval(startButton.textContent);
            startButton.textContent = 'Start Game!';
            
            snake = [
                { x: 2, y: 4 },
                { x: 1, y: 4 }
            ];
            
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreElement.textContent = score;
            gameOver = false;
            highScore = 0;

            generateFood();
            draw();
        }

        // Event listeners
        document.addEventListener('keydown', handleKeyPress);
        
        // Start the game
        startButton.click();
    </script>
</body>
</html>

<!-- Code generation time: ca. 1.5 minutes -->
